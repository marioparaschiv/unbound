name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      dry-run:
        description: Run semantic-release without publishing
        type: boolean
        default: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # bun.lock is lockfileVersion 2, which stable bun cannot parse until 1.4 releases.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: canary

      - run: bun install --frozen-lockfile

      # Publishing uses npm trusted publishing (OIDC), which needs npm >= 11.5.1; the runner's
      # preinstalled npm is older.
      - run: npm install --global npm@latest

      - run: bun run release ${{ inputs.dry-run == true && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
