# ast-grep catalog: drop redundant await inside Promise.all([...]). Auto-fixable.
# typescript + tsx variants kept in sync (one `language` per rule).
id: no-await-in-promise-all
language: typescript
severity: warning
message: 'Redundant `await` inside `Promise.all([...])` serializes the promises - drop it (ast-grep catalog).'
rule:
    pattern: await $A
    inside:
        pattern: Promise.all($_)
        stopBy:
            not:
                any:
                    - kind: array
                    - kind: arguments
fix: $A
